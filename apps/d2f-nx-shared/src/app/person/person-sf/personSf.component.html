<h3> signalForm (person)</h3>
 <form novalidate class="p-1 grid grid-cols-1 md:grid-cols-2  xl:grid-cols-3 gap-3">

     <d2fngx-read-only-field [formRef]="personForm" name="ref"  ></d2fngx-read-only-field>
    <d2fngx-label-input-field [formRef]="personForm" name="firstname"  ></d2fngx-label-input-field>
    <d2fngx-label-input-field [formRef]="personForm" name="lastname"  ></d2fngx-label-input-field>
    <!--
    <div>
        <label class="block text-sm">lastname:</label>
        <input [formField]="personForm.lastname" [ngClass]="classForField('lastname')" class="w-full" />
        <span class="text-red-600">{{mapFieldErrorMessageSignal().get('lastname')}}</span>
    </div>
   -->
    <d2fngx-label-input-field [formRef]="personForm" name="email"  ></d2fngx-label-input-field>
    <d2fngx-label-input-field [formRef]="personForm" name="taille" inputType="number" ></d2fngx-label-input-field>
    <d2fngx-label-input-field [formRef]="personForm" name="birthday" inputType="date"  ></d2fngx-label-input-field>
    <d2fngx-boolean-field [formRef]="personForm" name="celibataire" label="situation"></d2fngx-boolean-field>
    <d2fngx-choice-field [formRef]="personForm" name="genre" [pseudoEnum]="Genre"></d2fngx-choice-field>
    <d2fngx-choice-field [formRef]="personForm" 
                      name="nationalite" 
                      [items]="['francais','europeen','autre']"></d2fngx-choice-field>
    <d2fngx-many-select-field  [formRef]="personForm" name="sports"  
      [items]="['velo' , 'football' , 'tennis' , 'basket' ]" ></d2fngx-many-select-field>                 
</form>
    <!-- person : <span [style.color]="okPerson?'green':'red'">{{ personModel() | json }}</span> <br/> -->
    <input type="button" value="login" [disabled]="personForm().invalid()" (click)="onPerson()" /> <br/>
    message: <span [style.color]="okPerson?'green':'red'">{{messagePerson}}</span> 

    <hr/>
