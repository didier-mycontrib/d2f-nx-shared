<div class="flexAllInColumnDir little-margin">
    <header id="mainStickyHeader" class="stickyHeaderFirstInFlexCol" >
         <d2flayout-sticky-header [title]="title()" 
         [quickMenuDefs]="quickMenuDefs()"
         (togglerMenu)="onTogglerMenu()"></d2flayout-sticky-header> <!-- always visible -->
    </header>
    <div class="remainingContentInFlexCol">
      <mat-sidenav-container class="central-container-zone">
        <!-- mode = side , push (auto-close when click on main content) or
                          over (idem as push but over / no slide )-->
        <mat-sidenav #matSideNav [mode]="sideNavMode" [opened]="openedSideNav()"
            (mouseenter)="onMenuMouseEnterInMainSideNav()" class="sideNav-zone">
            <d2flayout-main-side-nav id="main-side-nav" [menuDefs]="mainMenuDefs()"
                  (afterNav)="onAfterNav($event)"></d2flayout-main-side-nav> <!-- with main/complete menu -->
        </mat-sidenav>
        <mat-sidenav-content class="main-zone">
             <d2flayout-main-content></d2flayout-main-content> <!-- with router-outlet -->
      </mat-sidenav-content>
      </mat-sidenav-container>
    </div>
    <footer class="stickyFooterLastInFlexCol">
         <d2flayout-sticky-footer
         [legalFooterMainText]="legalFooterMainText()"
         [legalFooterTemplateRef]="legalFooterTemplateRef()" 
         [quickMenuDefs]="quickMenuDefs()" ></d2flayout-sticky-footer> <!-- mobile only , contains quick-menu for mobile -->
    </footer>
  </div>
