<div >
    <label [ngClass]="labelClass()" >{{effectiveLabel()}}:</label>
    @if(formRef()){
          <input  [type]="inputType()" [formField]="formRef()[name()]" [ngClass]="inputClass()"
                 (focus)="onFocus()"  (blur)="onBlur()" (mouseenter)="onMouseEnter()"  (mouseleave)="onMouseLeave()"/>
          <span [style.display]="displayErr()?'block':'none'" class="p-1 text-red-600">{{fieldErrorMessageSignal()}}</span> 
    }@else{
        <input  [type]="inputType()"  [(ngModel)]="fieldData" [name]="name()" [ngClass]="inputClass()"/>
    }
</div>
