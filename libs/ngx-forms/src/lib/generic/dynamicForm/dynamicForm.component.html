<form novalidate class="grid grid-cols-1 md:grid-cols-2 gap-4">
 @for( key of objectKeysArray(entityModel); track key){
    <div>
        <label class="block text-sm">{{key}}:</label>
        <input [formField]="formRef()[key]" [ngClass]="classForField(key)" class="w-full" /> 
        <span class="text-red-600">{{errorSignal(key)()}}</span>
    </div>
   }
</form>
