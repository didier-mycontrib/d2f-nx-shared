<div>
    <label [ngClass]="labelClass()">{{effectiveLabel()}}:</label>
    @if(!bigChoice){
       @if(formRef()){
           @for(v of items(); track v){
             <label><input type="radio" [value]="v" [formField]="formRef()[name()]" >{{v}}</label>&nbsp;
           }
        }@else{
            @for(v of items(); track v){
             <label><input type="radio" [value]="v" [(ngModel)]="fieldData" [name]="name()" >{{v}}</label>&nbsp;
            }
    }
    }@else{
         @if(formRef()){
          <select [formField]="formRef()[name()]" class="ml-1">
              @for(v of items(); track v){
                <option>{{v}}</option>
              }
          </select>
        }@else{
          <select [(ngModel)]="fieldData" [name]="name()" class="ml-1">
               @for(v of items(); track v){
                <option>{{v}}</option>
              }
          </select>
        }
    }
</div>
