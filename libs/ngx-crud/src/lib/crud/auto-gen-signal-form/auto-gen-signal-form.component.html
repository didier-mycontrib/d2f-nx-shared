<form  class="grid grid-cols-1 md:grid-cols-2  xl:grid-cols-3 gap-3">
@for( key of objectKeysArray(objectTempRef()); track key){
       @if(isNoEditableId(key)){
        <ngx-read-only-field [(fieldData)]="objectTempRef()[key]" [name]="key"  ></ngx-read-only-field>
       }@else {
        <ngx-label-input-field [(fieldData)]="objectTempRef()[key]" [name]="key"  ></ngx-label-input-field>
       }
    }
</form>
<hr/>

<ngx-dynamic-form   [formRef]="objectForm" 
                    [mapFieldInfo]="objectFieldInfoMap"></ngx-dynamic-form>
